version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned staging table for stock price events streamed from Kafka."
    columns:
      - name: id
        tests:
          - not_null
          - unique

      - name: ticker
        tests:
          - not_null

      - name: price
        tests:
          - not_null

      - name: volume
        tests:
          - not_null

      - name: event_time
        tests:
          - not_null

      - name: source
        tests:
          - not_null

      - name: open_price

      - name: high_price

      - name: low_price

      - name: close_price

      - name: event_kind
        tests:
          - not_null

      - name: bar_interval
        tests:
          - not_null

      - name: market_session
        tests:
          - not_null
  - name: stg_symbol_reference
    description: "Canonical ticker dimension used to normalize company, sector, and benchmark metadata."
    columns:
      - name: ticker
        tests:
          - not_null
          - unique
      - name: company_name
        tests:
          - not_null
      - name: sector
        tests:
          - not_null
