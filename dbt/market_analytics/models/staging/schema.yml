version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned staging table for stock price events streamed from Kafka."
    columns:
      - name: id
        tests:
          - not_null
          - unique

      - name: ticker
        tests:
          - not_null

      - name: price
        tests:
          - not_null

      - name: volume
        tests:
          - not_null

      - name: event_time
        tests:
          - not_null

      - name: source
        tests:
          - not_null
