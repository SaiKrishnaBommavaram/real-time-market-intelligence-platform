services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "${MARKET_ZOOKEEPER_HOST_PORT:-52181}:2181"
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost 2181 30"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${MARKET_KAFKA_HOST_PORT:-59092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${MARKET_KAFKA_HOST_PORT:-59092}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MARKET_DB_NAME:-market_data}
      POSTGRES_USER: ${MARKET_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${MARKET_DB_PASSWORD:-postgres}
    ports:
      - "${MARKET_DB_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MARKET_DB_USER:-postgres} -d ${MARKET_DB_NAME:-market_data}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${MARKET_REDIS_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "${MARKET_MINIO_API_HOST_PORT:-59000}:9000"
      - "${MARKET_MINIO_CONSOLE_HOST_PORT:-59001}:9001"
    environment:
      MINIO_ROOT_USER: ${MARKET_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MARKET_MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  airflow-webserver:
    image: apache/airflow:2.9.1
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-postgres}:${AIRFLOW_DB_PASSWORD:-postgres}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    ports:
      - "${MARKET_AIRFLOW_HOST_PORT:-58080}:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    image: apache/airflow:2.9.1
    depends_on:
      airflow-webserver:
        condition: service_healthy
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-postgres}:${AIRFLOW_DB_PASSWORD:-postgres}@postgres:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-job-worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    environment:
      MARKET_ENV: ${MARKET_ENV:-local}
      MARKET_DB_HOST: postgres
      MARKET_DB_PORT: 5432
      MARKET_DB_NAME: ${MARKET_DB_NAME:-market_data}
      MARKET_DB_USER: ${MARKET_DB_USER:-postgres}
      MARKET_DB_PASSWORD: ${MARKET_DB_PASSWORD:-postgres}
      MARKET_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MARKET_REDIS_HOST: redis
      MARKET_REDIS_PORT: 6379
      MARKET_REDIS_DB: ${MARKET_REDIS_DB:-0}
      MARKET_TICKERS: ${MARKET_TICKERS:-AAPL,MSFT,GOOGL,AMZN,NVDA}
      MARKET_ENABLE_HISTORY_BACKFILL: ${MARKET_ENABLE_HISTORY_BACKFILL:-true}
      MARKET_HISTORY_PERIOD: ${MARKET_HISTORY_PERIOD:-1mo}
      MARKET_HISTORY_INTERVAL: ${MARKET_HISTORY_INTERVAL:-1h}
      MARKET_HISTORY_LOOKBACK_DAYS: ${MARKET_HISTORY_LOOKBACK_DAYS:-30}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      LOCAL_SUMMARIZER_MODEL: ${LOCAL_SUMMARIZER_MODEL:-sshleifer/distilbart-cnn-12-6}
      LOCAL_SUMMARIZER_MAX_LENGTH: ${LOCAL_SUMMARIZER_MAX_LENGTH:-90}
      LOCAL_SUMMARIZER_MIN_LENGTH: ${LOCAL_SUMMARIZER_MIN_LENGTH:-35}
      LOCAL_SUMMARIZER_INPUT_MAX_TOKENS: ${LOCAL_SUMMARIZER_INPUT_MAX_TOKENS:-1024}
      ARTICLE_NOTE_MAX_LENGTH: ${ARTICLE_NOTE_MAX_LENGTH:-60}
      ARTICLE_NOTE_MIN_LENGTH: ${ARTICLE_NOTE_MIN_LENGTH:-20}
      MARKET_JOB_WORKER_POLL_SECONDS: ${MARKET_JOB_WORKER_POLL_SECONDS:-5}
    command: python -m api.job_worker

volumes:
  postgres_data:
  minio_data:
