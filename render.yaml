services:
  - type: web
    name: real-time-market-intelligence-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker api.main:app --bind 0.0.0.0:$PORT --timeout 180 --access-logfile - --error-logfile -
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_ORIGIN_REGEX
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: MARKET_DB_HOST
        sync: false
      - key: MARKET_DB_PORT
        sync: false
      - key: MARKET_DB_NAME
        sync: false
      - key: MARKET_DB_USER
        sync: false
      - key: MARKET_DB_PASSWORD
        sync: false
