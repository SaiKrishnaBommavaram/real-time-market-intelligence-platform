services:
  - type: web
    name: real-time-market-intelligence-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_ORIGIN_REGEX
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: MARKET_DB_HOST
        sync: false
      - key: MARKET_DB_PORT
        sync: false
      - key: MARKET_DB_NAME
        sync: false
      - key: MARKET_DB_USER
        sync: false
      - key: MARKET_DB_PASSWORD
        sync: false
